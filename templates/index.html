<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Waste Classification</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container text-center">
    <h2 class="mb-4">🗑️ AI Waste Classification System</h2>

    <form action="/predict" method="post" enctype="multipart/form-data" onsubmit="showSpinner()">
        <div class="form-group">
            <input type="file" class="form-control-file" name="file" required>
        </div>
        <button type="submit" class="btn btn-custom btn-block">Upload & Predict</button>
    </form>

    <div class="spinner-border text-primary" id="spinner" role="status">
        <span class="sr-only">Loading...</span>
    </div>

    {% if prediction %}
    <div class="alert alert-success result-box">
        <h4>
            {% if icon %}<span class="icon">{{ icon }}</span>{% endif %}
            ♻️ Predicted Waste Type: <strong>{{ prediction|capitalize }}</strong>
        </h4>
        {% if confidence %}<p>Confidence: <strong>{{ confidence }}%</strong></p>{% endif %}
        {% if image_url %}<img src="{{ image_url }}" class="image-preview" alt="Uploaded Image">{% endif %}
    </div>
    {% endif %}
</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
